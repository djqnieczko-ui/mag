name: Supabase schema migration

on:
  push:
    branches: ["main"]
    paths:
      - "supabase.sql"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run schema migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail

          DB_MODE=""
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            case "$SUPABASE_DB_URL" in
              postgres://*|postgresql://*)
                DB_MODE="url"
                ;;
              *)
                echo "SUPABASE_DB_URL must start with postgres:// or postgresql://"
                exit 1
                ;;
            esac
          elif [ -n "${SUPABASE_DB_HOST:-}" ] && [ -n "${SUPABASE_DB_NAME:-}" ] && [ -n "${SUPABASE_DB_USER:-}" ] && [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            DB_MODE="fields"
            DB_PORT_VALUE="${SUPABASE_DB_PORT:-5432}"
            export PGPASSWORD="$SUPABASE_DB_PASSWORD"
          else
            echo "Missing DB secrets. Set SUPABASE_DB_URL or all of: SUPABASE_DB_HOST, SUPABASE_DB_NAME, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD (optional SUPABASE_DB_PORT)."
            exit 1
          fi

          echo "Testing database connection..."

          if [ "$DB_MODE" = "url" ]; then
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "select 1;" >/dev/null
          else
            psql \
              -h "$SUPABASE_DB_HOST" \
              -p "$DB_PORT_VALUE" \
              -U "$SUPABASE_DB_USER" \
              -d "$SUPABASE_DB_NAME" \
              -v ON_ERROR_STOP=1 \
              -c "select 1;" >/dev/null
          fi

          echo "Connection OK. Running migration..."

          if [ "$DB_MODE" = "url" ]; then
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase.sql
          else
            psql \
              -h "$SUPABASE_DB_HOST" \
              -p "$DB_PORT_VALUE" \
              -U "$SUPABASE_DB_USER" \
              -d "$SUPABASE_DB_NAME" \
              -v ON_ERROR_STOP=1 \
              -f supabase.sql
          fi
