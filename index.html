<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magazyn - Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="topbar">
    <h1>Magazyn</h1>
    <p>Prosty panel stanów magazynowych</p>
  </header>

  <main class="layout">
    <section class="card import-card">
      <h2>Import CSV</h2>
      <p class="muted">1) Wybierz plik CSV. 2) Przypisz nagłówki CSV do pól magazynu. 3) Zaimportuj pozycje.</p>
      <div class="import-controls">
        <input type="file" id="csv-file" accept=".csv,text/csv" />
        <button type="button" class="btn btn-light" id="prepare-import">Przygotuj mapowanie</button>
        <button type="button" class="btn btn-primary" id="run-import" disabled>Importuj CSV</button>
      </div>
      <div id="csv-meta" class="csv-meta"></div>
      <div id="csv-mapping" class="csv-mapping"></div>
      <div id="csv-result" class="csv-result"></div>
    </section>

    <section class="card form-card">
      <h2>Dodaj lub zaktualizuj produkt</h2>
      <form id="item-form">
        <div class="grid">
          <label>
            Dział
            <select id="department" required>
              <option value="">Wybierz dział</option>
              <option value="Swiatlo">Swiatlo</option>
              <option value="Dzwiek">Dzwiek</option>
              <option value="Scena">Scena</option>
              <option value="Kraty">Kraty</option>
            </select>
          </label>
          <label>
            Kategoria
            <select id="category" required>
              <option value="">Najpierw wybierz dział</option>
            </select>
          </label>
          <label>
            Nazwa
            <input type="text" id="name" required placeholder="np. Reflektor LED 200W" />
          </label>
          <label>
            Waga (kg)
            <input type="number" id="weight" min="0" step="0.01" required placeholder="np. 7.5" />
          </label>
          <label>
            Ilość
            <input type="number" id="quantity" min="0" required placeholder="0" />
          </label>
          <label>
            Kod urządzenia
            <input type="text" id="deviceCode" required placeholder="np. SW-LED-001" />
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Zapisz pozycję</button>
      </form>
    </section>

    <section class="card list-card">
      <div class="list-header">
        <h2>Lista pozycji</h2>
        <input id="search" type="search" placeholder="Szukaj: dział, kategoria, nazwa, kod" />
      </div>

      <div class="stats" id="stats"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Dział</th>
              <th>Kategoria</th>
              <th>Nazwa</th>
              <th>Waga (kg)</th>
              <th>Ilość</th>
              <th>Kod urządzenia</th>
              <th>Akcje</th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <template id="row-template">
    <tr>
      <td data-field="department"></td>
      <td data-field="category"></td>
      <td data-field="name"></td>
      <td data-field="weight"></td>
      <td data-field="quantity"></td>
      <td data-field="deviceCode"></td>
      <td>
        <button class="btn btn-light" data-action="edit">Edytuj</button>
        <button class="btn btn-danger" data-action="delete">Usuń</button>
      </td>
    </tr>
  </template>

  <script src="app.js"></script>
</body>
</html>
