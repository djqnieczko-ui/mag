<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magazyn - Stan Magazynu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="topbar">
    <div class="topbar-row">
      <div>
        <h1>Magazyn</h1>
        <p>Aktualny stan magazynu</p>
      </div>
      <nav class="nav-tabs">
        <a href="index.html" class="nav-tab nav-tab-active">Stan magazynu</a>
        <a href="manage.html" class="nav-tab">Zarządzanie</a>
      </nav>
    </div>
    <div class="topbar-meta">
      <div id="build-version" class="build-version">Wersja: lokalna</div>
      <div id="data-mode" class="build-version">Dane: Supabase (cloud)</div>
    </div>
  </header>

  <main class="layout">

    <section class="card list-card">
      <div class="list-header">
        <h2>Lista pozycji</h2>
        <input id="search" type="search" placeholder="Szukaj: dzial, kategoria, producent, nazwa, kod" />
      </div>

      <div class="filter-bar">
        <label>
          Filtr dział
          <select id="filter-department">
            <option value="">Wszystkie działy</option>
          </select>
        </label>
        <label>
          Filtr kategoria
          <select id="filter-category">
            <option value="">Wszystkie kategorie</option>
          </select>
        </label>
        <label>
          Filtr producent
          <select id="filter-producer">
            <option value="">Wszyscy producenci</option>
          </select>
        </label>
      </div>

      <div class="stats" id="stats"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Dział</th>
              <th>Kategoria</th>
              <th>Producent</th>
              <th>Nazwa</th>
              <th>Waga (kg)</th>
              <th>Ilość</th>
              <th>Kod urządzenia</th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <template id="row-template">
    <tr>
      <td data-field="department"></td>
      <td data-field="category"></td>
      <td data-field="producer"></td>
      <td data-field="name"></td>
      <td data-field="weight"></td>
      <td data-field="quantity"></td>
      <td data-field="deviceCode"></td>
    </tr>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="view.js"></script>
</body>
</html>
